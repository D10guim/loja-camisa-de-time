<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Camisa 10 - Sistema de Gestão</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        input[type="file"] { grid-column: span 2; background: #fafafa; }
        
        button { grid-column: span 2; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; }

        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #555; }
        .img-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>👕 Cadastro de Camisas</h2>
    
    <div class="form-group">
        <input type="text" id="nome" placeholder="Nome da Estampa/Modelo">
        <input type="text" id="tamanho" placeholder="Tamanho (P, M, G, GG)">
        <input type="number" id="preco" step="0.01" placeholder="Preço R$">
        <input type="file" id="foto_input" accept="image/*">
        <button type="button" onclick="cadastrarCamisa()">Salvar no Banco de Dados</button>
    </div>

    <h3>Catálogo de Produtos</h3>
    <table>
        <thead>
            <tr>
                <th>Foto</th>
                <th>Modelo</th>
                <th>Tam.</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            </tbody>
    </table>
</div>

<script>
    const API_URL = 'http://127.0.0.1:5000/camisas';

    async function cadastrarCamisa() {
        const nome = document.getElementById('nome').value;
        const tamanho = document.getElementById('tamanho').value;
        const preco = document.getElementById('preco').value;
        const foto = document.getElementById('foto_input').files[0];

        if (!nome || !preco || !foto) {
            alert("Por favor, preencha o nome, preço e selecione uma imagem!");
            return;
        }

        const formData = new FormData();
            formData.append('nome', document.getElementById('nome').value);
            formData.append('tamanho', document.getElementById('tamanho').value);
            formData.append('preco', document.getElementById('preco').value);

            const inputFoto = document.querySelector('input[type="file"]');
            if (inputFoto.files[0]) {
                formData.append('foto', inputFoto.files[0]); 
            }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                alert("✅ Camisa cadastrada com sucesso!");
                document.getElementById('nome').value = '';
                document.getElementById('foto_input').value = '';
                listarCamisas(); // Atualiza a tabela
            } else {
                alert("❌ Erro ao salvar no banco.");
            }
        } catch (error) {
            console.error("Erro de conexão:", error);
            alert("Não foi possível conectar ao servidor Python!");
        }
    }

    async function listarCamisas() {
        try {
            const response = await fetch('http://127.0.0.1:5000/camisas');
            const camisas = await response.json();
            
            console.log("Dados recebidos do Python:", camisas);

            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = ''; // Limpa a tabela antes de carregar

            camisas.forEach(c => {
                corpo.innerHTML += `
                    <tr>
                        <td><img src="${c.imagem}" width="50" onerror="this.src='https://via.placeholder.com/50'"></td>
                        <td>${c.nome}</td>
                        <td>${c.tamanho}</td>
                        <td>R$ ${parseFloat(c.preco).toFixed(2)}</td>
                    </tr>`;
            });
        } catch (error) {
            console.error("Erro ao listar:", error);
        }
    }
window.onload = listarCamisas;
</script>

</body>
</html>
