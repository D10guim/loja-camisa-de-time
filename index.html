<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Loja Camisa 10 - AC1</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .form-group { margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h2>Cadastro de Camisas (AC1)</h2>
    
    <div class="form-group">
        <input type="text" id="nome" placeholder="Nome da Camisa">
        <input type="text" id="tamanho" placeholder="Tamanho (ex: G)">
        <input type="number" id="preco" placeholder="Preço">
        <button onclick="cadastrarCamisa()">Cadastrar</button>
    </div>

    <h3>Catálogo no Banco de Dados</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Tamanho</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo"></tbody>
    </table>

    <script>
        const API_URL = 'http://127.0.0.1:5000/camisas';

        // Função para cadastrar (POST)
        async function cadastrarCamisa() {
            const dados = {
                nome: document.getElementById('nome').value,
                tamanho: document.getElementById('tamanho').value,
                preco: parseFloat(document.getElementById('preco').value)
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            alert("Cadastrado!");
            listarCamisas(); // Atualiza a lista
        }

        // Função para listar (GET)
        async function listarCamisas() {
            const response = await fetch(API_URL);
            const camisas = await response.json();
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';

            camisas.forEach(c => {
                corpo.innerHTML += `
                    <tr>
                        <td>${c.id}</td>
                        <td>${c.nome}</td>
                        <td>${c.tamanho}</td>
                        <td>R$ ${c.preco.toFixed(2)}</td>
                    </tr>`;
            });
        }

        // Carrega ao abrir a página
        listarCamisas();
    </script>
</body>
</html>
